<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>De-Extinction Explorer · BioHack 2026</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header>
    <div class="logo">
      De-Extinction Explorer
      <span class="logo-badge">BioHack 2026</span>
    </div>
    <nav>
      <a href="#">How we calculate everything!</a>
      <!-- <a href="#">Adding Your Own Data</a> -->
    </nav>
  </header>

  <!-- ── Main: cards left + hero right ─────────────────────── -->
  <div class="main-area">

    <!-- Left: species cards -->
    <div class="species-stack" id="species-stack"></div>

    <!-- Right: hero panel -->
    <div id="hero"></div>
        
  </div>

  <!-- ── Candidate section ──────────────────────────────────── -->
  <div class="section" id="candidate-section">
    <div class="section-title">Choose a Candidate Species</div>
    <div class="candidate-grid" id="candidate-grid"></div>
  </div>

  <!-- ── Analysis section ───────────────────────────────────── -->
  <div class="section" id="analysis-section">
    <div class="section-title">Genomic &amp; Ecological Analysis</div>

    <div class="analysis-panel" id="analysis-panel">

      <!-- Row 1: DNA similarity + Radar chart -->
      <div class="analysis-grid">

        <div class="analysis-card">
          <div class="ac-title">DNA Similarity</div>
          <div class="sim-big" id="sim-big">—</div>
          <div class="sim-bar-wrap">
            <div class="sim-bar" id="sim-bar" style="width:0%"></div>
          </div>
          <div style="font-size:13px;color:var(--text-faint);font-weight:600;margin-top:6px;" id="sim-label"></div>
        </div>

        <div class="analysis-card">
          <div class="ac-title">Ecological Factor Scores</div>
          <div class="radar-wrap">
            <svg id="radar-svg" viewBox="0 0 260 220" width="260" height="220" overflow="visible"></svg>
          </div>
        </div>

      </div>

      <!-- Row 2: Temperature range chart + Eco factor cards -->
      <div class="analysis-grid two-thirds">

        <div class="analysis-card">
          <div class="ac-title">Temperature Range Comparison</div>
          <svg id="temp-svg" viewBox="0 0 480 120" width="100%" height="120" overflow="visible"></svg>
        </div>

        <div class="analysis-card">
          <div class="ac-title">Ecological Factors</div>
          <div class="eco-row" id="eco-row"></div>
        </div>

      </div>

      <!-- Row 3: Summary comparison table -->
      <div class="analysis-card" style="margin-top:16px;">
        <div class="ac-title">Species Comparison Summary</div>
        <div id="summary-table"></div>
      </div>

      <!-- Phylogenetic tree -->
      <div class="phylo-card" style="margin-top:16px;">
        <div class="ac-title">Phylogenetic Tree</div>
        <svg id="phylo-svg" overflow="visible"></svg>
      </div>

    </div>
  </div>

  <!-- ── Verdict card ───────────────────────────────────────── -->
  <div class="verdict-card" id="verdict-card"></div>


</div><!-- /app -->

<script src="data.js"></script>
<script src="scoring.js"></script>
<script src="app.js"></script>
</body>
</html>
